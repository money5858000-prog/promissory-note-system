        async function saveToBackend() {
            const amount = document.getElementById('input-amount').value;
            const name = document.getElementById('input-name').value;

            if (!amount || !name) {
                alert("請填寫必要資訊");
                return;
            }

            const data = {
                amount,
                issuer: name,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                sig: canvas.toDataURL()
            };

            try {
                // 將資料存入雲端資料庫 (Firestore)
                await db.collection("notes").add(data);
                alert("已同步至雲端後台！");
                loadCloudData(); // 重新讀取清單
            } catch (e) {
                console.error("存檔失敗: ", e);
            }
        }

        async function loadCloudData() {
            const snapshot = await db.collection("notes").orderBy("timestamp", "desc").get();
            const container = document.getElementById('backend-list');
            container.innerHTML = "";
